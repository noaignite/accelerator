name: CI:Release

on:
  push:
    branches:
      - 'main'

env:
  HUSKY: 0

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  # Allow the release step to comment on issues, pull requests and write to the repo.
  contents: write
  issues: write
  pull-requests: write
  # Required for OIDC to let npm registry know that this workflow is trusted.
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Set up node
        uses: actions/setup-node@v6
        with:
          # npm trusted publishing via OIDC requires a newer npm version.
          # Using Node 24 ensures the bundled npm meets npm's OIDC requirements.
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          publish: pnpm run ci:release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build Slack release summary
        if: steps.changesets.outputs.published == 'true'
        id: release_summary
        uses: actions/github-script@v7
        env:
          PUBLISHED_PACKAGES: ${{ steps.changesets.outputs.publishedPackages }}
        with:
          script: |
            const packages = JSON.parse(process.env.PUBLISHED_PACKAGES || '[]');
            const summary = packages.length
              ? packages
                  .map(({ name, version }) => {
                    const releaseTag = encodeURIComponent(`${name}@${version}`);
                    const packageUrl = `https://github.com/${process.env.GITHUB_REPOSITORY}/releases/tag/${releaseTag}`;

                    return `* <${packageUrl}|${name}@${version}>`;
                  })
                  .join('\n')
              : 'Package details were not returned by Changesets.';

            core.setOutput('count', String(packages.length));
            core.setOutput('summary', summary);

      - name: Notify Slack
        if: steps.changesets.outputs.published == 'true'
        uses: slackapi/slack-github-action@v3.0.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            text: "A new Accelerator release was published."
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: "*:rocket: Accelerator packages published*"
              - type: section
                text:
                  type: mrkdwn
                  text: "*:package: Packages*\n${{ steps.release_summary.outputs.summary }}"
