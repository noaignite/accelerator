name: CI:Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - '**'

env:
  HUSKY: 0

jobs:
  test-and-coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{github.event.pull_request.head.sha}}
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Set up node
        uses: actions/setup-node@v6
        with:
          # Keep CI on Node 24 so the bundled npm matches the release workflow's
          # OIDC-compatible npm version requirement for trusted publishing.
          node-version: 24
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check changeset status
        if: github.actor != 'dependabot[bot]'
        run: pnpm ci:status

      - name: Run build
        run: pnpm build

      - name: Run tests with coverage
        run: pnpm ci:test

      - name: Upload coverage to Codecov
        if: ${{ github.actor != 'dependabot[bot]' }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: packages
          fail_ci_if_error: true
